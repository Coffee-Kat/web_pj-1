<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CSS Стилізація</title>

    <!-- Внутрішній CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h2 {
            color: #00bcd4;
            text-align: center;
        }

        .box {
            border: 2px solid white;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }

        a:hover {
            color: yellow;
        }
    </style>

    <!-- Зовнішній CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Вбудований CSS -->
    <h1 style="color: orange; text-align:center;">CSS Стилізація сторінки</h1>

    <h2>Параграфи</h2>
    <p>Це перший параграф тексту.</p>
    <p>Це другий параграф тексту.</p>

    <h2>Список</h2>
    <ul>
        <li>Пункт 1</li>
        <li>Пункт 2</li>
        <li>Пункт 3</li>
    </ul>

    <h2>Посилання</h2>
    <a href="https://www.google.com" target="_blank">Google</a><br>
    <a href="https://www.youtube.com" target="_blank">YouTube</a>

    <h2>Зображення</h2>
    <img src=".\assets\test_1.jpg" alt="Зображення">

    <h2>Блоки (div)</h2>
    <div class="box">Перший блок</div>
    <div class="box">Другий блок</div>

</div>

</body>
</html>
