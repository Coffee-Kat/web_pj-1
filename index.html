<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2>ESPORTS HUB</h2>
</header>

<section class="hero">
    <div>
        <h1>TOURNAMENT PLATFORM</h1>

        <select>
            <option>Valorant</option>
            <option>CS2</option>
            <option>Minecraft</option>
        </select>

        <br><br>

        <button class="btn" onclick="register()">Зареєструватись</button>
        <button class="btn" onclick="scrollToTournaments()">Переглянути турніри</button>
    </div>
</section>

<section class="section">
    <h2>Active Tournaments</h2>
    <div class="tournaments"></div>
</section>

<section class="section">
    <h2>Bracket (Double Elimination)</h2>
    <div class="bracket"></div>
</section>

<section class="section">
    <h2>Teams</h2>
    <div class="tournaments"></div>
</section>

<section class="section">
    <h2>Admin Panel</h2>

    <input placeholder="Tournament name"><br><br>

    <select>
        <option>Valorant</option>
        <option>CS2</option>
        <option>Minecraft</option>
    </select><br><br>

    <input placeholder="Date"><br><br>
    <input placeholder="Format (5v5 / 1v1)"><br><br>
    <input placeholder="Prize"><br><br>

    <textarea placeholder="Teams (через кому)"></textarea><br><br>

    <button class="btn" onclick="createTournament()">Create Tournament</button>
</section>

<footer class="footer">
    <p>© 2026 Esports Platform</p>
</footer>

<script src="script.js"></script>

</body>
</html>
