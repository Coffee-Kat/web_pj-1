<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esports Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h2>ESPORTS HUB</h2>
    <div>
        <button class="btn admin-open-btn">Admin</button>
            <div class="admin-dropdown hidden">
                <div class="admin-box">
                    <h3>Admin Panel</h3>

                    <input class="input name" placeholder="Tournament name">
                    <select class="input game">
                        <option>Valorant</option>
                        <option>CS2</option>
                        <option>Minecraft</option>
                    </select>
                    <input class="input date" type="date">
                    <input class="input format" placeholder="1v1 / 5v5">
                    <input class="input prize" placeholder="Prize">
                    <textarea class="input teams-input" placeholder="Teams (через кому)"></textarea>

                    <button class="btn create-btn">Create / Update</button>
                </div>
            </div>
        <button class="btn logout-btn hidden">Logout</button>
            <div class="login-dropdown hidden">
                <div class="login-box">
                    <h3>Admin Login</h3>
                    <input class="input username" placeholder="Login">
                    <input class="input password" type="password" placeholder="Password">
                    <button class="btn login-btn">Увійти</button>
                </div>
            </div>
    </div>
</header>

<section class="hero">
    <h1>TOURNAMENT PLATFORM</h1>

    <select class="game-select">
        <option>Valorant</option>
        <option>CS2</option>
        <option>Minecraft</option>
    </select>

    <div class="hero-buttons">
        <button class="btn register-btn">Зареєструватись</button>
        <button class="btn scroll-btn">Переглянути турніри</button>
    </div>
</section>

<section class="section tournaments-section">
    <h2>Active Tournaments</h2>
    <div class="tournaments"></div>
</section>

<section class="section">
    <h2>Bracket</h2>
    <div class="bracket"></div>
</section>

<section class="section">
    <h2>Teams</h2>
    <div class="teams"></div>
</section>

<section class="section admin hidden">
    <h2>Admin Panel</h2>

    <input class="input name" placeholder="Tournament name">
    <select class="input game">
        <option>Valorant</option>
        <option>CS2</option>
        <option>Minecraft</option>
    </select>
    <input class="input date" type="date">
    <input class="input format" placeholder="1v1 / 5v5">
    <input class="input prize" placeholder="Prize">
    <textarea class="input teams-input" placeholder="Teams (через кому)"></textarea>

    <button class="btn create-btn">Create / Update</button>
</section>

<div class="login-modal hidden">
    <div class="login-box">
        <h2>Admin Login</h2>
        <input class="input username" placeholder="Login">
        <input class="input password" type="password" placeholder="Password">
        <button class="btn login-btn">Увійти</button>
    </div>
</div>

<footer class="footer">
    <p>© 2026 Esports Platform</p>
</footer>

</body>
<script src="script.js"></script>
</html>
