<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2>ESPORTS HUB</h2>
</header>

<section class="hero">
    <div>
        <h1>TOURNAMENT PLATFORM</h1>

        <select class="game-select">
            <option>Valorant</option>
            <option>CS2</option>
            <option>Minecraft</option>
        </select>

        <br><br>

        <button class="btn register-btn">Зареєструватись</button>
        <button class="btn scroll-btn">Переглянути турніри</button>
    </div>
</section>

<section class="section tournaments-section">
    <h2>Active Tournaments</h2>
    <div class="tournaments"></div>
</section>

<section class="section">
    <h2>Bracket (Double Elimination)</h2>
    <div class="bracket"></div>
</section>

<section class="section">
    <h2>Teams</h2>
    <div class="teams"></div>
</section>

<section class="section">
    <h2>Admin Panel</h2>

    <input class="input name" placeholder="Tournament name"><br><br>

    <select class="input game">
        <option>Valorant</option>
        <option>CS2</option>
        <option>Minecraft</option>
    </select><br><br>

    <input class="input date" placeholder="Date"><br><br>
    <input class="input format" placeholder="Format (1v1 / 5v5)"><br><br>
    <input class="input prize" placeholder="Prize"><br><br>

    <textarea class="input teams-input" placeholder="Teams (через кому)"></textarea><br><br>

    <button class="btn create-btn">Create Tournament</button>
</section>

<footer class="footer">
    <p>© 2026 Esports Platform</p>
</footer>

<script src="script.js"></script>

</body>
</html>
