<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h2>ESPORTS HUB</h2>
</header>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>TOURNAMENT PLATFORM</h1>

        <select id="gameSelect">
            <option>Valorant</option>
            <option>CS2</option>
            <option>Minecraft</option>
        </select>

        <br><br>

        <button class="btn" onclick="register()">Зареєструватись</button>
        <button class="btn" onclick="scrollToTournaments()">Переглянути турніри</button>
    </div>
</section>

<!-- ТУРНІРИ -->
<section class="section" id="tournaments">
    <h2>Active Tournaments</h2>
    <div class="tournaments" id="tournamentList"></div>
</section>

<!-- BRACKET -->
<section class="section">
    <h2>Bracket (Double Elimination)</h2>
    <div class="bracket" id="bracket"></div>
</section>

<!-- TEAMS -->
<section class="section">
    <h2>Teams</h2>
    <div id="teams" class="tournaments"></div>
</section>

<footer class="footer">
    <p>© 2026 Esports Platform</p>
</footer>

<!-- ADMIN PANEL -->
<section class="section">
    <h2>Admin Panel</h2>

    <input id="name" placeholder="Tournament name"><br><br>

    <select id="game">
        <option>Valorant</option>
        <option>CS2</option>
        <option>Minecraft</option>
    </select><br><br>

    <input id="date" placeholder="Date"><br><br>
    <input id="format" placeholder="Format (5v5 / 1v1)"><br><br>
    <input id="prize" placeholder="Prize"><br><br>

    <textarea id="teamsInput" placeholder="Teams (через кому)"></textarea><br><br>

    <button class="btn" onclick="createTournament()">Create Tournament</button>
</section>

<script src="script.js"></script>

</body>
</html>
