<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Layout</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1e1e1e;
    color: white;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2c2c2c;
    padding: 15px;
}

.nav {
    display: flex;
    gap: 15px;
}

/* MAIN */
.main {
    display: flex;
    padding: 20px;
    gap: 20px;
}

/* CONTENT + SIDEBAR */
.content {
    flex: 3;
}

.sidebar {
    flex: 1;
    background: #2c2c2c;
    padding: 15px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.card {
    flex: 1 1 calc(33% - 10px);
    background: #2c2c2c;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
}

/* FOOTER */
.footer {
    display: flex;
    justify-content: space-around;
    background: #2c2c2c;
    padding: 20px;
}

.footer div {
    flex: 1;
    text-align: center;
}

/* TABLET */
@media (max-width: 992px) {
    .cards .card {
        flex: 1 1 calc(50% - 10px);
    }
}

/* MOBILE */
@media (max-width: 768px) {
    .main {
        flex-direction: column;
    }

    .cards {
        flex-direction: column;
    }

    .header {
        flex-direction: column;
        gap: 10px;
    }

    .footer {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">LOGO</div>
    <nav class="nav">
        <a href="#">Головна</a>
        <a href="#">Послуги</a>
        <a href="#">Про нас</a>
        <a href="#">Контакти</a>
    </nav>
</header>

<!-- MAIN -->
<main class="main">

    <!-- CONTENT -->
    <section class="content">
        <h1>Основний контент</h1>
        <p>Тут знаходиться основна інформація сайту.</p>

        <!-- CARDS -->
        <div class="cards">
            <div class="card">Картка 1</div>
            <div class="card">Картка 2</div>
            <div class="card">Картка 3</div>
        </div>
    </section>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>Сайдбар</h2>
        <p>Додаткова інформація</p>
    </aside>

</main>

<!-- FOOTER -->
<footer class="footer">
    <div>Контакти</div>
    <div>Соцмережі</div>
    <div>© 2026</div>
</footer>

</body>
</html>
